<div class="page">
  <div class="header">
    <h2>通知发布与管理</h2>
    <button type="button" class="back-btn" (click)="goDashboard()">返回</button>
  </div>

  <section class="card create-entry-card">
    <button type="button" class="create-launch-btn" (click)="openCreatePanel()" [disabled]="creatingInfo">
      <span>发布新通知</span>
    </button>

    <div
      *ngIf="createPanelExpanded"
      class="create-modal-backdrop"
      (click)="onCreatePanelBackdropClick($event)"
    >
      <div class="create-modal card" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
        <div class="create-modal-head">
          <strong class="create-modal-title">{{ isEditMode ? '编辑通知' : '新建通知' }}</strong>
          <button type="button" class="modal-close-btn" (click)="closeCreatePanel()" [disabled]="creatingInfo">
            关闭
          </button>
        </div>

        <div class="create-body">
          <app-student-selector-panel
            [disabled]="creatingInfo"
            [panelExpanded]="studentPanelExpanded"
            [filterExpanded]="studentFilterExpanded"
            [columnPanelExpanded]="createStudentColumnPanelExpanded"
            [studentsLoading]="studentsLoading"
            [studentsError]="studentsError"
            [selectedCount]="selectedCreateStudentCount"
            [filteredStudents]="filteredCreateStudentOptions"
            [selectedStudents]="selectedCreateStudentOptions"
            [countryFilterOptions]="countryFilterOptions"
            [provinceFilterOptions]="provinceFilterOptions"
            [cityFilterOptions]="cityFilterOptions"
            [schoolBoardFilterOptions]="schoolBoardFilterOptions"
            [graduationSeasonFilterOptions]="graduationSeasonFilterOptions"
            [countryFilterInput]="createCountryFilterInput"
            [provinceFilterInput]="createProvinceFilterInput"
            [cityFilterInput]="createCityFilterInput"
            [schoolBoardFilterInput]="createSchoolBoardFilterInput"
            [graduationSeasonFilterInput]="createGraduationSeasonFilterInput"
            [filterFields]="createStudentFilterFields"
            [studentKeyword]="createStudentKeyword"
            [visibleColumns]="visibleCreateStudentColumns"
            [columnToggleOptions]="createStudentColumnToggleOptions"
            [isAllVisibleSelected]="areAllVisibleStudentsSelected()"
            [isVisibleSelectionPartial]="isVisibleStudentSelectionPartial()"
            [isColumnSelectionAtDefault]="isCreateStudentColumnSelectionAtDefault()"
            [isStudentSelected]="isCreateStudentSelectedRef"
            [isStudentOutOfCurrentFilter]="isSelectedStudentOutOfCurrentFilterRef"
            [isStudentSelectable]="isCreateStudentSelectableRowRef"
            [isColumnVisible]="isCreateStudentColumnVisibleRef"
            [resolveColumnValue]="resolveCreateStudentColumnValueRef"
            [detailTeacherNote]="detailTeacherNoteRef"
            [isTeacherNoteSaving]="isTeacherNoteSavingRef"
            (panelToggle)="toggleStudentPanel()"
            (filterPanelToggle)="toggleStudentFilterPanel()"
            (columnPanelToggle)="toggleCreateStudentColumnPanel()"
            (refreshStudents)="refreshAssignableStudents()"
            (resetFilters)="resetStudentMetaFilters()"
            (resetColumns)="resetCreateStudentVisibleColumns()"
            (clearSelected)="clearSelectedStudents()"
            (countryFilterInputChange)="onCountryFilterInputChange($event)"
            (provinceFilterInputChange)="onProvinceFilterInputChange($event)"
            (cityFilterInputChange)="onCityFilterInputChange($event)"
            (schoolBoardFilterInputChange)="onSchoolBoardFilterInputChange($event)"
            (graduationSeasonFilterInputChange)="onGraduationSeasonFilterInputChange($event)"
            (studentKeywordChange)="onStudentKeywordChange($event)"
            (selectAllToggle)="onToggleSelectAll($event)"
            (studentSelectionChange)="onCreateStudentCheckboxChange($event.studentId, $event.checked)"
            (columnVisibilityChange)="onCreateStudentColumnVisibilityChange($event.key, $event.checked)"
            (columnOrderChange)="onCreateStudentColumnOrderChange($event.orderedVisibleColumnKeys)"
            (teacherNoteFocus)="onTeacherNoteCellFocus($event)"
            (teacherNoteChange)="onTeacherNoteCellChange($event.studentId, $event.value)"
            (teacherNoteBlur)="onTeacherNoteCellBlur($event)"
          ></app-student-selector-panel>

          <div class="form">
            <select [(ngModel)]="createInfoCategory" [disabled]="creatingInfo">
              <option value="ACTIVITY">活动</option>
              <option value="VOLUNTEER">义工</option>
            </select>
            <input [(ngModel)]="createInfoTags" [disabled]="creatingInfo" placeholder="标签：A,B,C" />
            <input [(ngModel)]="createInfoTitle" [disabled]="creatingInfo" placeholder="通知标题" />
            <textarea
              [(ngModel)]="createInfoContent"
              [disabled]="creatingInfo"
              rows="4"
              placeholder="通知内容"
            ></textarea>
          </div>

          <div class="actions">
            <button type="button" (click)="createInfo()" [disabled]="creatingInfo || studentsLoading">
              {{ creatingInfo ? '保存中...' : '保存' }}
            </button>
            <button type="button" (click)="resetCreateInfoForm()" [disabled]="creatingInfo">清空</button>
          </div>

          <div *ngIf="createInfoError" class="error-text">{{ createInfoError }}</div>
          <div *ngIf="createInfoSuccess" class="success-text">{{ createInfoSuccess }}</div>
        </div>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="tools">
      <h3>已发布通知</h3>
      <select [(ngModel)]="infoFilterCategory" [disabled]="infosLoading">
        <option value="ALL">全部分类</option>
        <option value="ACTIVITY">活动</option>
        <option value="VOLUNTEER">义工</option>
      </select>
      <input type="search" [(ngModel)]="infoFilterTag" [disabled]="infosLoading" placeholder="标签" />
      <input type="search" [(ngModel)]="infoFilterKeyword" [disabled]="infosLoading" placeholder="关键字" />
      <button type="button" (click)="applyInfoFilters()" [disabled]="infosLoading">查询</button>
      <button type="button" (click)="clearInfoFilters()" [disabled]="infosLoading">重置</button>
      <button type="button" (click)="refreshInfos()" [disabled]="infosLoading">刷新</button>
      <span class="count-text">{{ infos.length }} 条</span>
    </div>

    <div *ngIf="infosLoading" class="state-text">正在加载通知...</div>
    <div *ngIf="!infosLoading && infosError" class="error-text">{{ infosError }}</div>
    <div *ngIf="!infosLoading && !infosError && infos.length === 0" class="state-text">暂无通知。</div>

    <article *ngFor="let info of infos; trackBy: trackInfo" class="info-item">
      <div class="info-item-header">
        <strong>{{ info.title }}</strong>
        <span class="info-category">{{ infoCategoryLabel(info.category) }}</span>
      </div>
      <p>{{ info.content }}</p>
      <small>覆盖学生：{{ info.targetStudentCount }}</small>
      <div class="info-tags" *ngIf="info.tags.length > 0">
        <span *ngFor="let tag of info.tags">#{{ tag }}</span>
      </div>
      <div class="info-actions">
        <button
          type="button"
          (click)="openEditPanel(info)"
          [disabled]="creatingInfo || !canEditInfo(info)"
          [title]="infoEditDisabledReason(info)"
        >
          编辑并换人
        </button>
      </div>
    </article>
  </section>
</div>
