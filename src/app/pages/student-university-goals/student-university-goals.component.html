<main class="ouac-page">
  <header class="ouac-header">
    <div>
      <h1>大学目标</h1>
    </div>
    <button type="button" class="plain-btn" (click)="goBack()">返回</button>
  </header>

  <p *ngIf="message" class="notice">{{ message }}</p>

  <section class="choice-board" aria-label="大学目标">
    <article
      *ngFor="let choice of choices; let i = index; trackBy: trackChoice"
      class="choice-tile"
      [class.dragging]="dragIndex === i"
      draggable="true"
      (dragstart)="onDragStart(i)"
      (dragover)="onDragOver($event)"
      (drop)="onDrop(i)"
      (dragend)="onDragEnd()"
    >
      <div class="tile-top">
        <button type="button" class="drag-handle" title="拖动排序">⋮⋮</button>
        <span>Choice {{ i + 1 }}</span>
      </div>

      <div class="tile-main">
        <h2>{{ choice.universityName }}</h2>
        <p *ngIf="choice.campus">{{ choice.campus }}</p>
      </div>

      <dl>
        <div>
          <dt>专业</dt>
          <dd>{{ choice.programName }}</dd>
        </div>
      </dl>

      <button type="button" class="delete-btn" (click)="removeChoice(choice)">删除</button>
    </article>

    <button type="button" class="add-tile" (click)="openModal()" aria-label="添加大学目标">
      <span>+</span>
      <strong>添加大学目标</strong>
    </button>
  </section>

  <div *ngIf="modalOpen" class="modal-backdrop" (click)="closeModal()">
    <section class="choice-modal" (click)="$event.stopPropagation()">
      <header>
        <div>
          <h2>添加大学目标</h2>
        </div>
        <button type="button" class="close-btn" (click)="closeModal()">×</button>
      </header>

      <div class="form-body">
        <label class="autocomplete-field">
          <span>大学</span>
          <input
            type="text"
            [(ngModel)]="draft.universityName"
            (ngModelChange)="onUniversityInput()"
            list="university-options"
            placeholder="输入或选择大学"
          />
          <datalist id="university-options">
            <option *ngFor="let university of universities" [value]="university.name"></option>
          </datalist>
          <div *ngIf="draft.universityName && visibleUniversities.length > 0" class="suggestion-list">
            <button
              type="button"
              *ngFor="let university of visibleUniversities"
              (click)="selectUniversity(university)"
            >
              {{ university.name }}
            </button>
          </div>
        </label>

        <label *ngIf="selectedUniversity?.campuses?.length">
          <span>校区</span>
          <select [(ngModel)]="draft.campus">
            <option value="">请选择校区</option>
            <option *ngFor="let campus of selectedUniversity?.campuses" [value]="campus">
              {{ campus }}
            </option>
          </select>
        </label>

        <label>
          <span>专业</span>
          <input
            type="text"
            [(ngModel)]="draft.programName"
            [disabled]="!selectedUniversity"
            list="program-options"
            placeholder="输入或选择专业"
          />
          <datalist id="program-options">
            <option *ngFor="let program of visiblePrograms" [value]="program.name"></option>
          </datalist>
          <div *ngIf="draft.programName && visiblePrograms.length > 0" class="suggestion-list">
            <button
              type="button"
              *ngFor="let program of visiblePrograms"
              (click)="selectProgram(program)"
            >
              {{ program.name }}
            </button>
          </div>
        </label>

      </div>

      <footer>
        <button type="button" class="plain-btn" (click)="closeModal()">取消</button>
        <button type="button" class="save-btn" (click)="addChoice()">添加</button>
      </footer>
    </section>
  </div>
</main>
