<div class="course-plan-page">
  <div class="course-plan-shell">
    <div class="page-head">
      <div class="page-title">
        <h2>Course Plan</h2>
        <p class="page-subtitle" *ngIf="managedMode">Teacher mode - Student #{{ studentId }}</p>
      </div>

      <div class="page-actions">
        <button type="button" class="ghost-btn" (click)="goProfile()">Student Profile</button>
        <button type="button" class="primary-btn" (click)="backToDashboard()">
          {{ managedMode ? 'Back to Teacher Dashboard' : 'Back to Dashboard' }}
        </button>
      </div>
    </div>

    <app-course-plan-prototype></app-course-plan-prototype>
  </div>
</div>
