<label
  *ngIf="shouldShowFilterField('country')"
  class="student-filter-item"
>
  &#22269;&#23478;
  <input
    class="student-filter-input country-filter-input"
    [ngModel]="countryFilterInput"
    (ngModelChange)="countryFilterInputChange.emit($event)"
    [name]="idPrefix + '-country-filter'"
    [attr.list]="idPrefix + '-country-options'"
    placeholder="All"
    [disabled]="disabled"
  />
  <datalist [attr.id]="idPrefix + '-country-options'">
    <option *ngFor="let option of countryFilterOptions" [value]="option"></option>
  </datalist>
</label>

<div
  *ngIf="shouldShowFilterField('coursePlan')"
  class="student-filter-item course-plan-filter-item"
>
  <label class="course-plan-filter-label">
    Course Code / 课程代码
    <input
      class="student-filter-input course-code-filter-input"
      [ngModel]="courseCodeFilterInput"
      (ngModelChange)="courseCodeFilterInputChange.emit($event)"
      [name]="idPrefix + '-course-code-filter'"
      [attr.list]="idPrefix + '-course-code-options'"
      placeholder="MHF4U"
      [disabled]="disabled"
    />
    <datalist [attr.id]="idPrefix + '-course-code-options'">
      <option *ngFor="let option of courseCodeFilterOptions" [value]="option"></option>
    </datalist>
  </label>

  <label class="course-plan-filter-label">
    Status / 状态
    <select
      class="student-filter-select course-status-filter-select"
      [ngModel]="courseStatusFilter"
      (ngModelChange)="onCourseStatusFilterSelect($event)"
      [disabled]="disabled"
    >
      <option [ngValue]="''">Any / 全部</option>
      <option
        *ngFor="let option of courseStatusFilterOptions"
        [ngValue]="option"
      >
        {{ resolveCourseStatusFilterOptionLabel(option) }}
      </option>
    </select>
  </label>
</div>

<label
  *ngIf="shouldShowFilterField('volunteerCompleted')"
  class="student-filter-item"
>
  &#20041;&#24037;&#23436;&#25104;
  <select
    class="student-filter-select volunteer-completed-filter-select"
    [ngModel]="volunteerCompletedFilter"
    (ngModelChange)="onVolunteerCompletedFilterSelect($event)"
    [disabled]="disabled || volunteerCompletedDisabled"
    [attr.title]="volunteerCompletedTitle"
  >
    <option [ngValue]="''">&#20840;&#37096;</option>
    <option [ngValue]="'COMPLETED'">&#24050;&#23436;&#25104;</option>
    <option [ngValue]="'NOT_COMPLETED'">&#26410;&#23436;&#25104;</option>
  </select>
</label>

<input

  class="student-filter-item student-filter-keyword"

  [disabled]="disabled"
  [placeholder]="keywordPlaceholder"
/>
