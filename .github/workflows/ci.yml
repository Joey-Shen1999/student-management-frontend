name: CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Run tests if available
        shell: bash
        run: |
          set -euo pipefail
          if npm pkg get scripts.test:ci | grep -qv '^{}$'; then
            npm run test:ci
          elif npm pkg get scripts.test | grep -qv '^{}$'; then
            npm test -- --watch=false
          else
            echo "No frontend test script found; skipping tests."
          fi

      - name: Build Angular production bundle
        shell: bash
        run: |
          set -euo pipefail
          npm run build -- --configuration production
